name: BOE Backfill — Recuperar año en curso

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Año a recuperar (vacío = año actual)'
        required: false
        default: ''
      desde_mes:
        description: 'Mes de inicio (1-12)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Ejecutar backfill
        env:
          BACKFILL_YEAR:       ${{ inputs.year }}
          BACKFILL_FROM_MONTH: ${{ inputs.desde_mes }}
        run: python boe_backfill.py

      - name: Guardar cambios
        run: |
          git config user.name  "BOE Monitor Bot"
          git config user.email "bot@boe-monitor"
          git add historial/ data.json
          git diff --staged --quiet || git commit -m "BOE Backfill: año ${{ inputs.year || 'actual' }}"
          git push
