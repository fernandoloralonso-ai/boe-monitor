name: BOE Monitor Diario

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Ejecutar monitor
        env:
          EMAIL_USUARIO:       ${{ secrets.EMAIL_USUARIO }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP_SERVER:   ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT:     ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_DESTINATARIOS: ${{ secrets.EMAIL_DESTINATARIOS }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: python boe_monitor.py

      - name: Guardar cambios
        run: |
          git config user.name  "BOE Monitor Bot"
          git config user.email "bot@boe-monitor"
          git add historial/ data.json normas_estado.json || true
          git diff --staged --quiet || git commit -m "BOE Monitor: $(date +'%Y-%m-%d')"
          git push
